name: CI

on:
  push:
    branches: [main]
  # No branch filter: stacked PRs (base != main) must run CI too.
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clijvm
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Integration tests attach to a JVM this job spawns itself (same user),
      # so no extra privileges are needed on the runner.
      - name: Build and test
        run: ./gradlew build --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: clijvm/build/reports/tests/test
          if-no-files-found: ignore
